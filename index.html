ิศทางโดยรวมคือการเติบโต"], ["p", "และในความเข้าใจนี้ มีความสงบอย่างหนึ่ง เพราะเราไม่ต้องต่อสู้กับทุกวันที่ไม่สมบูรณ์แบบอีกต่อไป แต่เพียงต้องปรากฏตัวอย่างสม่ำเสมอ และไว้วางใจในเส้นทางที่คดเคี้ยวแต่มุ่งไปข้างหน้า"]], "28": [["p", "ความเชื่อมั่นเป็นสิ่งที่นักวิ่งทุกคนปรารถนา ความรู้สึกมั่นใจว่าเราทำได้ ว่าเราแข็งแรงพอ ว่าร่างกายจะพาเราไปถึงเป้าหมาย แต่ความเชื่อมั่นที่แท้จริงไม่ได้มาจากคำพูดปลุกใจหรือการคิดบวก มันสร้างจากสิ่งเดียวเท่านั้น นั่นคือประสบการณ์"], ["h", "ความเชื่อมั่นที่หยั่งราก"], ["p", "มีความแตกต่างระหว่างความมั่นใจที่ผิวเผินกับความเชื่อมั่นที่หยั่งราก ความมั่นใจแบบผิวเผินอาจมาจากการพูดกับตัวเองว่าเราทำได้ แต่มันเปราะบางและพังทลายง่ายเมื่อเจอความยากลำบาก ส่วนความเชื่อมั่นที่หยั่งรากมาจากการได้ทำสิ่งนั้นจริง ๆ ซ้ำแล้วซ้ำเล่า จนร่างกายและใจรู้ว่าเราทำได้"], ["p", "นักวิ่งที่เคยวิ่งไกลมาแล้วหลายครั้ง ย่อมเชื่อมั่นในความสามารถที่จะวิ่งไกลอีกครั้ง ไม่ใช่เพราะเขาบอกตัวเองให้เชื่อ แต่เพราะเขามีหลักฐานจากประสบการณ์จริง ความเชื่อมั่นชนิดนี้มั่นคงและไว้วางใจได้"], ["h", "การฝึกคือการสะสมหลักฐาน"], ["p", "เมื่อมองในแง่นี้ การฝึกซ้อมทุกครั้งไม่ได้เพียงพัฒนาร่างกาย แต่ยังสะสมหลักฐานที่สร้างความเชื่อมั่น ทุกการวิ่งยาวที่เราทำสำเร็จ ทุกครั้งที่เราผ่านความเหนื่อยไปได้ ทุกครั้งที่เราลุกขึ้นมาวิ่งในวันที่ไม่อยาก ล้วนเป็นอิฐก้อนเล็ก ๆ ที่ก่อร่างเป็นความเชื่อมั่นภายใน"], ["p", "นี่คือเหตุผลว่าทำไมการฝึกที่จำลองความท้าทายของเป้าหมายจึงมีค่า เมื่อเราได้ซ้อมในสภาพที่ใกล้เคียงกับการแข่งขัน เราไม่เพียงเตรียมร่างกาย แต่ยังสร้างความเชื่อมั่นว่าเราคุ้นเคยกับความรู้สึกนั้นแล้ว และเรารับมือกับมันได้"], ["h", "ความเชื่อมั่นที่ได้จากการก้าวผ่านความยาก"], ["p", "ที่น่าสนใจคือ ความเชื่อมั่นที่ลึกที่สุดมักมาจากการก้าวผ่านช่วงเวลาที่ยากที่สุด เมื่อเราเผชิญการบาดเจ็บและกลับมาได้ เมื่อเราผ่านการแข่งขันที่โหดร้ายไปได้ เมื่อเราอดทนผ่านช่วงที่อยากยอมแพ้ เราได้เรียนรู้ว่าเราแข็งแกร่งกว่าที่คิด และความรู้นี้กลายเป็นรากฐานของความเชื่อมั่นที่ไม่มีใครพรากไปได้"], ["p", "ความยากลำบากจึงไม่ใช่เพียงอุปสรรค แต่เป็นโอกาสในการสร้างความเชื่อมั่นที่ลึกซึ้ง นักวิ่งที่ผ่านความยากมามาก มักมีความเชื่อมั่นที่สงบและมั่นคง เพราะเขารู้จากประสบการณ์ว่าเขารับมือได้"], ["h", "เชื่อมั่นอย่างมีเหตุผล"], ["p", "เมื่อเราเข้าใจว่าความเชื่อมั่นสร้างจากประสบการณ์ เราจะเลิกมองหาความมั่นใจจากภายนอก และหันมาสร้างมันจากภายในผ่านการกระทำ ทุกก้าวที่เราวิ่ง ทุกความท้าทายที่เราเผชิญ คือการลงทุนในความเชื่อมั่นที่จะพาเราไปได้ไกลกว่าเดิม"], ["p", "และความเชื่อมั่นที่สร้างขึ้นเช่นนี้ ไม่ได้อยู่แค่ในการวิ่ง แต่แผ่ขยายไปสู่ทุกด้านของชีวิต เพราะเมื่อเรารู้ว่าเราสามารถอดทนและก้าวผ่านความยากในการวิ่งได้ เราก็เชื่อมั่นมากขึ้นในความสามารถที่จะเผชิญความท้าทายอื่น ๆ ที่ชีวิตนำมา"]], "29": [["p", "ในโลกของการวิ่ง เรามักถูกล้อมรอบด้วยการเปรียบเทียบ เวลาของคนอื่น ระยะทางของคนอื่น ความเร็วของคนอื่น และเป็นเรื่องง่ายที่จะรู้สึกว่าเรากำลังแข่งกับคนรอบตัว แต่เมื่อเราเดินทางในเส้นทางนี้นานพอ เราจะค้นพบความจริงที่ปลดปล่อย นั่นคือ คู่แข่งที่แท้จริงเพียงคนเดียวคือตัวเราเอง"], ["h", "การเปรียบเทียบที่ไม่มีวันจบ"], ["p", "การเปรียบเทียบตัวเองกับคนอื่นเป็นกับดักที่ไม่มีวันจบ เพราะจะมีคนที่เร็วกว่าเราเสมอ และมีคนที่ช้ากว่าเราเสมอ หากเราวัดคุณค่าของตัวเองด้วยการเปรียบเทียบ เราจะไม่มีวันพอใจ เพราะไม่ว่าเราจะพัฒนาไปแค่ไหน ก็ยังมีคนที่อยู่ไกลกว่า"], ["p", "ยิ่งไปกว่านั้น การเปรียบเทียบมักไม่ยุติธรรม เพราะเราไม่รู้เรื่องราวเบื้องหลังของคนอื่น เราไม่รู้ว่าเขาฝึกมานานแค่ไหน มีพรสวรรค์อย่างไร มีชีวิตแบบไหน การเปรียบเทียบเวลาของเรากับเขาจึงเหมือนการเปรียบเทียบสิ่งที่เปรียบเทียบกันไม่ได้"], ["h", "แข่งกับตัวเองเมื่อวาน"], ["p", "คู่แข่งที่มีความหมายที่สุดคือตัวเราในวันวาน นักวิ่งที่เราเคยเป็นเมื่อเดือนก่อน เมื่อปีก่อน เมื่อเราเริ่มต้น การวัดความก้าวหน้าด้วยการเทียบกับตัวเองในอดีตนั้นยุติธรรมและมีความหมาย เพราะมันสะท้อนการเดินทางที่แท้จริงของเรา"], ["p", "เมื่อเราโฟกัสกับการเป็นนักวิ่งที่ดีขึ้นกว่าตัวเราเมื่อวาน แทนที่จะเป็นนักวิ่งที่ดีกว่าคนอื่น เราจะพบความสงบและความหมายในการฝึก ทุกก้าวเล็ก ๆ ของความก้าวหน้ากลายเป็นชัยชนะ ไม่ว่าคนอื่นจะอยู่ตรงไหน"], ["h", "แรงบันดาลใจไม่ใช่การแข่งขัน"], ["p", "นี่ไม่ได้หมายความว่าเราต้องเพิกเฉยต่อนักวิ่งคนอื่น ในทางกลับกัน นักวิ่งที่เก่งกว่าเราสามารถเป็นแรงบันดาลใจอันทรงพลัง เราสามารถเรียนรู้จากพวกเขา ชื่นชมความสามารถของพวกเขา และให้พวกเขาเป็นแสงนำทางว่าอะไรเป็นไปได้"], ["p", "ความแตกต่างอยู่ที่ท่าที เราสามารถมองคนอื่นเป็นแรงบันดาลใจโดยไม่ต้องมองเป็นคู่แข่งที่ต้องเอาชนะ เราสามารถยินดีกับความสำเร็จของคนอื่น ในขณะที่ยังคงมุ่งมั่นกับการเดินทางของเราเอง"], ["h", "ชัยชนะที่แท้จริง"], ["p", "เมื่อเราเข้าใจว่าคู่แข่งที่แท้จริงคือตัวเราเอง เรานิยามชัยชนะใหม่ ชัยชนะไม่ใช่การเอาชนะคนอื่น แต่คือการเอาชนะข้อจำกัดของตัวเอง ความขี้เกียจ ความกลัว และความสงสัยในตัวเอง ทุกครั้งที่เราก้าวข้ามสิ่งเหล่านี้ เราได้ชัยชนะที่มีความหมายมากกว่าการเข้าเส้นชัยก่อนใคร"], ["p", "และในการแข่งขันกับตัวเองนี้ ไม่มีผู้แพ้ มีแต่การเติบโต เพราะทุกครั้งที่เราพยายามเป็นตัวเราที่ดีขึ้น เราชนะแล้ว ไม่ว่าตัวเลขบนนาฬิกาจะบอกอะไร"]], "30": [["p", "มีจุดหนึ่งในการเดินทางของนักวิ่งหลายคน เมื่อการวิ่งเปลี่ยนจากสิ่งที่เราทำ กลายเป็นส่วนหนึ่งของสิ่งที่เราเป็น ไม่ใช่แค่กิจกรรมในตารางชีวิต แต่เป็นส่วนหนึ่งของตัวตน เมื่อถึงจุดนั้น การวิ่งไม่ได้เป็นเพียงสิ่งที่เราเลือกทำ แต่กลายเป็นส่วนหนึ่งของคำตอบว่าเราคือใคร"], ["h", "จากกิจกรรมสู่ตัวตน"], ["p", "ในตอนเริ่มต้น การวิ่งมักเป็นสิ่งที่เราต้องบังคับตัวเองให้ทำ เพื่อสุขภาพ เพื่อลดน้ำหนัก หรือเพื่อเป้าหมายบางอย่าง แต่เมื่อเวลาผ่านไป และการวิ่งกลายเป็นส่วนหนึ่งของชีวิตประจำวัน บางสิ่งเปลี่ยนไป เราไม่ได้วิ่งเพียงเพราะเราควรวิ่ง แต่เพราะการวิ่งกลายเป็นส่วนหนึ่งของว่าเราเป็นใคร"], ["p", "เมื่อถึงจุดนี้ วันที่ไม่ได้วิ่งรู้สึกเหมือนขาดบางอย่างไป ไม่ใช่เพราะความรู้สึกผิด แต่เพราะการวิ่งได้กลายเป็นส่วนหนึ่งของจังหวะชีวิตของเรา เป็นสิ่งที่ทำให้เรารู้สึกเป็นตัวเอง"], ["h", "ตัวตนที่หล่อหลอมด้วยการกระทำ"], ["p", "ตัวตนของนักวิ่งไม่ได้เกิดจากการประกาศว่าเราเป็นนักวิ่ง แต่เกิดจากการวิ่งซ้ำแล้วซ้ำเล่าจนมันกลายเป็นส่วนหนึ่งของเรา ทุกครั้งที่เราออกไปวิ่ง โดยเฉพาะในวันที่ยากลำบาก เรากำลังตอกย้ำและเสริมสร้างตัวตนนี้ เรากำลังบอกตัวเองว่า นี่คือคนที่ฉันเป็น คนที่ปรากฏตัวและวิ่ง"], ["p", "นี่เป็นพลังที่ลึกซึ้ง เพราะเมื่อบางสิ่งกลายเป็นส่วนหนึ่งของตัวตนของเรา เราไม่ต้องใช้กำลังใจในการทำมันอีกต่อไป มันกลายเป็นธรรมชาติ เป็นสิ่งที่เราทำเพราะมันคือตัวเรา"], ["h", "การวิ่งที่เปลี่ยนเรา"], ["p", "เมื่อการวิ่งกลายเป็นส่วนหนึ่งของตัวตน มันเริ่มหล่อหลอมเราในแบบที่ไกลเกินกว่าร่างกาย ความอดทนที่เราสร้างในการวิ่งแผ่ขยายไปสู่ชีวิต ความสามารถในการอดทนต่อความไม่สบาย การก้าวผ่านช่วงที่ยากลำบาก และการปรากฏตัวอย่างสม่ำเสมอ ล้วนกลายเป็นคุณสมบัติที่เรานำติดตัวไปในทุกด้าน"], ["p", "นักวิ่งหลายคนพบว่า บทเรียนที่ลึกที่สุดที่พวกเขาได้จากการวิ่ง ไม่ใช่เรื่องของร่างกาย แต่เป็นเรื่องของชีวิต ความอดทน ความสม่ำเสมอ การยอมรับความไม่สมบูรณ์แบบ และการเดินหน้าต่อไป"], ["h", "เป็นนักวิ่งไปตลอด"], ["p", "เมื่อการวิ่งกลายเป็นส่วนหนึ่งของตัวตน มันไม่ได้ผูกติดกับความเร็วหรือระยะทางอีกต่อไป เราจะยังคงเป็นนักวิ่งไม่ว่าเราจะวิ่งเร็วหรือช้า ไกลหรือใกล้ เพราะการเป็นนักวิ่งไม่ได้อยู่ที่ตัวเลข แต่อยู่ที่ความสัมพันธ์ที่เรามีกับการวิ่ง และความหมายที่มันมีต่อชีวิตเรา"], ["p", "และนั่นคือของขวัญที่งดงามที่สุดอย่างหนึ่งของการวิ่ง มันไม่ได้เพียงเปลี่ยนสิ่งที่เราทำได้ แต่เปลี่ยนว่าเราเป็นใคร และมอบตัวตนที่เราภาคภูมิใจให้เราถือไว้ตลอดชีวิต"]], "31": [["p", "สำหรับนักวิ่งหลายคน เส้นชัยของการแข่งขันคือจุดหมายที่พวกเขามุ่งไป เป็นวันที่ทุกการฝึกซ้อมนำไปสู่ แต่เมื่อเราข้ามเส้นชัยนั้นแล้ว เรามักค้นพบความจริงที่ลึกซึ้ง นั่นคือ เส้นชัยไม่ใช่จุดจบ แต่เป็นเพียงหมุดหมายหนึ่งในการเดินทางที่ยาวกว่านั้นมาก"], ["h", "ความว่างเปล่าหลังเป้าหมาย"], ["p", "นักวิ่งจำนวนไม่น้อยรู้สึกแปลกใจกับความรู้สึกหลังจากบรรลุเป้าหมายที่ตั้งไว้นาน หลังจากการเฉลิมฉลอง มักมีความรู้สึกว่างเปล่าตามมา เหมือนถามตัวเองว่า แล้วต่อไปล่ะ นี่เป็นประสบการณ์ที่พบได้บ่อย และมันสอนบทเรียนสำคัญ นั่นคือ ความหมายของการวิ่งไม่ได้อยู่ที่เส้นชัยเพียงอย่างเดียว"], ["p", "หากความสุขทั้งหมดของเราผูกไว้กับการบรรลุเป้าหมายปลายทาง เราจะพบว่าความสุขนั้นสั้นและตามมาด้วยความว่างเปล่า แต่หากเราพบความหมายในการเดินทางเอง ในการฝึกในแต่ละวัน ในการเติบโตทีละน้อย ความสุขของเราจะยั่งยืนกว่ามาก"], ["h", "การเดินทางคือรางวัล"], ["p", "เมื่อมองย้อนกลับไป นักวิ่งหลายคนพบว่าสิ่งที่พวกเขาให้คุณค่ามากที่สุดไม่ใช่ชั่วขณะที่ข้ามเส้นชัย แต่เป็นการเดินทางที่นำไปสู่มัน เช้าที่ตื่นไปวิ่งในความมืด การวิ่งยาวในวันหยุด ความรู้สึกแข็งแรงขึ้นทีละน้อย มิตรภาพที่เกิดขึ้นระหว่างทาง เหล่านี้คือรางวัลที่แท้จริง"], ["p", "เส้นชัยเป็นเพียงสัญลักษณ์ที่ให้ทิศทางและความหมายแก่การเดินทาง แต่คุณค่าที่แท้จริงอยู่ในทุกก้าวที่นำเราไปถึงที่นั่น เมื่อเราเข้าใจสิ่งนี้ เราจะเรียนรู้ที่จะเพลิดเพลินกับการเดินทาง ไม่ใช่แค่รอคอยจุดหมาย"], ["h", "เป้าหมายใหม่เสมอ"], ["p", "หลังเส้นชัยหนึ่ง มักมีเส้นชัยใหม่รออยู่ เป้าหมายใหม่ ระยะทางใหม่ ความท้าทายใหม่ นี่ไม่ใช่ความไม่รู้จักพอ แต่เป็นธรรมชาติของการเติบโต เมื่อเราบรรลุสิ่งหนึ่ง เราค้นพบว่ามีอีกสิ่งที่เป็นไปได้ และการเดินทางก็ดำเนินต่อไป"], ["p", "ความงามอยู่ที่ว่า การวิ่งไม่มีจุดสิ้นสุดที่แท้จริง เราไม่มีวันเป็นนักวิ่งที่สมบูรณ์แบบ ไม่มีวันเรียนรู้ทุกสิ่ง ไม่มีวันถึงขีดจำกัดสุดท้าย เสมอมีที่ให้เติบโต มีสิ่งใหม่ให้ค้นพบ มีการเดินทางให้ดำเนินต่อ"], ["h", "จุดจบที่เป็นจุดเริ่มต้น"], ["p", "เมื่อเราเข้าใจว่าเส้นชัยไม่ใช่จุดจบ เราจะปลดปล่อยตัวเองจากการผูกความสุขทั้งหมดไว้กับผลลัพธ์ปลายทาง และหันมาโอบรับการเดินทางทั้งหมด แต่ละเส้นชัยกลายเป็นทั้งการเฉลิมฉลองสิ่งที่ผ่านมา และจุดเริ่มต้นของสิ่งที่จะมาถึง"], ["p", "และในมุมมองนี้ การวิ่งกลายเป็นการเดินทางที่ไม่มีวันจบ ที่เต็มไปด้วยความหมายในทุกก้าว ไม่ใช่แค่ในชั่วขณะที่เราข้ามเส้น แต่ในทุกวันที่เราเลือกที่จะออกไปวิ่งต่อไป"]], "32": [["p", "ท่ามกลางการพูดถึงการฝึก เป้าหมาย และการพัฒนา เป็นเรื่องง่ายที่จะลืมสิ่งที่เรียบง่ายที่สุดและสำคัญที่สุดในการวิ่ง นั่นคือ ความสุข เบื้องหลังเหตุผลทั้งหมดที่เราวิ่ง มีบางสิ่งที่ลึกกว่านั้น ความสุขบริสุทธิ์ของการเคลื่อนที่ไปข้างหน้าด้วยกำลังของตัวเอง"], ["h", "ความสุขที่เราเคยรู้จัก"], ["p", "ลองนึกถึงตอนเป็นเด็ก เราวิ่งโดยไม่มีเหตุผล ไม่ใช่เพื่อสุขภาพ ไม่ใช่เพื่อเป้าหมาย แต่เพราะมันสนุก เพราะร่างกายอยากเคลื่อนไหว เพราะความรู้สึกของลมที่ปะทะหน้าและอิสระของการวิ่งเล่นทำให้เรามีความสุข ความสุขบริสุทธิ์นี้คือรากเหง้าของการวิ่ง และมันยังอยู่ในตัวเราเสมอ"], ["p", "บางครั้งในการไล่ตามเป้าหมายและตัวเลข เราลืมความสุขเรียบง่ายนี้ไป เราเปลี่ยนการวิ่งให้กลายเป็นงานที่ต้องทำ เป็นภาระที่ต้องแบก แต่หากเราหยุดและระลึกถึงว่าทำไมเราถึงเริ่มวิ่งตั้งแต่แรก เรามักพบความสุขนั้นรออยู่"], ["h", "ช่วงเวลาแห่งความสุขในการวิ่ง"], ["p", "ความสุขในการวิ่งมาในหลายรูปแบบ บางครั้งเป็นความรู้สึกลื่นไหลเมื่อทุกอย่างเข้าที่ ร่างกายและใจเป็นหนึ่งเดียว และการวิ่งรู้สึกไร้ความพยายาม บางครั้งเป็นความสงบของการวิ่งคนเดียวยามเช้า เมื่อโลกยังเงียบและจิตใจได้พักผ่อน บางครั้งเป็นความอิ่มเอมหลังการวิ่งที่ยากลำบาก เมื่อเรารู้ว่าเราทำได้"], ["p", "และบางครั้งความสุขก็อยู่ในสิ่งเล็ก ๆ แสงแดดยามเช้าที่ลอดผ่านต้นไม้ เสียงฝีเท้าที่เป็นจังหวะ ความรู้สึกของร่างกายที่แข็งแรงและมีชีวิต สิ่งเหล่านี้คือของขวัญที่การวิ่งมอบให้ในทุกวัน หากเราเปิดใจรับมัน"], ["h", "รักษาความสุขไว้"], ["p", "หนึ่งในสิ่งที่สำคัญที่สุดที่นักวิ่งทำได้คือการรักษาความสุขในการวิ่งไว้ เพราะความสุขนี้เองที่จะทำให้เราวิ่งต่อไปได้ในระยะยาว เมื่อการวิ่งกลายเป็นเพียงหน้าที่หรือความทรมาน เราจะเลิกในที่สุด แต่เมื่อการวิ่งยังคงมีความสุข เราจะกลับมาหามันครั้งแล้วครั้งเล่าตลอดชีวิต"], ["p", "นี่หมายความว่าบางครั้งเราต้องยอมวางเป้าหมายและตัวเลขลง แล้ววิ่งเพียงเพื่อความสุขของการวิ่ง วิ่งช้า ๆ ในเส้นทางที่สวยงาม วิ่งโดยไม่สนใจนาฬิกา วิ่งเพียงเพราะเรารักที่จะวิ่ง"], ["h", "ความสุขคือเหตุผลที่แท้จริง"], ["p", "ท้ายที่สุด แม้เราจะมีเหตุผลมากมายในการวิ่ง ทั้งสุขภาพ เป้าหมาย และการเติบโต เหตุผลที่ลึกที่สุดและยั่งยืนที่สุดคือความสุข เราวิ่งเพราะมันทำให้เรารู้สึกมีชีวิต เพราะมันมอบความสงบ ความอิสระ และความปีติที่หาไม่ได้จากที่อื่น"], ["p", "และเมื่อเราจดจำความสุขนี้ไว้ในใจ การวิ่งจะไม่มีวันกลายเป็นภาระ แต่จะยังคงเป็นของขวัญที่เราให้ตัวเองในทุกวัน เป็นแหล่งความสุขที่เราสามารถกลับไปหาได้เสมอ ตราบเท่าที่เรายังก้าวเท้าออกไป"]], "33": [["p", "หากถามว่าใครคือนักวิ่งที่ดีที่สุด หลายคนจะนึกถึงแชมป์โลก เจ้าของสถิติ หรือนักวิ่งที่เร็วที่สุด แต่เมื่อเราเดินทางในเส้นทางนี้นานพอ เราจะค้นพบว่านิยามของนักวิ่งที่ดีที่สุดนั้นลึกซึ้งและเป็นส่วนตัวกว่าที่คิดมาก"], ["h", "ไม่ใช่คนที่เร็วที่สุด"], ["p", "นักวิ่งที่ดีที่สุดไม่จำเป็นต้องเป็นคนที่เร็วที่สุด เพราะความเร็วขึ้นอยู่กับหลายปัจจัยที่อยู่นอกเหนือการควบคุมของเรา ทั้งพันธุกรรม อายุ และสรีระ นักวิ่งสองคนที่ทุ่มเทเท่ากันอาจมีความเร็วต่างกันมากเพราะสิ่งที่ติดตัวมาต่างกัน การวัดคุณค่าด้วยความเร็วเพียงอย่างเดียวจึงไม่ยุติธรรมและไม่มีความหมาย"], ["p", "นักวิ่งที่ดีที่สุดในความหมายที่แท้จริง คือคนที่ใช้ศักยภาพที่ตัวเองมีอย่างเต็มที่ คนที่ทุ่มเท อดทน และเติบโตอย่างต่อเนื่อง ไม่ว่าจุดเริ่มต้นและขีดจำกัดของเขาจะเป็นอย่างไร"], ["h", "นักวิ่งที่ดีที่สุดคือคนที่ยังวิ่งอยู่"], ["p", "มีมุมมองหนึ่งที่งดงามว่า นักวิ่งที่ดีที่สุดคือคนที่ยังคงวิ่งอยู่ คนที่ยังไม่ยอมแพ้ คนที่ยังคงปรากฏตัวและก้าวเท้าออกไปแม้ผ่านอุปสรรค การบาดเจ็บ และช่วงเวลาที่ยากลำบาก เพราะความสามารถในการดำรงอยู่ในเส้นทางนี้ในระยะยาว คือความสำเร็จที่ลึกซึ้งกว่าผลการแข่งขันใด ๆ"], ["p", "นักวิ่งที่วิ่งได้ตลอดชีวิต ที่ยังคงรักการวิ่งเมื่อผ่านไปหลายสิบปี ที่ดูแลร่างกายให้พาเขาไปได้ไกล คือผู้ที่เข้าใจแก่นแท้ของการวิ่งอย่างลึกซึ้งที่สุด"], ["h", "การเป็นนักวิ่งที่ดีที่สุดของตัวเอง"], ["p", "แทนที่จะพยายามเป็นนักวิ่งที่ดีที่สุดในโลก เป้าหมายที่มีความหมายกว่าคือการเป็นนักวิ่งที่ดีที่สุดที่ตัวเราเป็นได้ นี่หมายถึงการใช้ศักยภาพของเราอย่างเต็มที่ การดูแลร่างกายอย่างชาญฉลาด การรักษาความสุขในการวิ่ง และการเติบโตอย่างต่อเนื่องในแบบของเราเอง"], ["p", "เป้าหมายนี้อยู่ในมือของเราทุกคน ไม่ว่าเราจะมีพรสวรรค์แค่ไหน ไม่ว่าเราจะเริ่มต้นตรงไหน เราทุกคนสามารถเป็นนักวิ่งที่ดีที่สุดของตัวเองได้ ผ่านความทุ่มเท ความอดทน และความรักในการวิ่ง"], ["h", "คุณสมบัติที่แท้จริง"], ["p", "เมื่อมองในแง่นี้ คุณสมบัติของนักวิ่งที่ดีที่สุดไม่ใช่ความเร็วหรือพรสวรรค์ แต่เป็นความสม่ำเสมอ ความอดทน ความถ่อมตน ความสามารถในการฟังร่างกาย และความรักที่ยั่งยืนในการวิ่ง คุณสมบัติเหล่านี้เราทุกคนสามารถพัฒนาได้ และมันคือสิ่งที่ทำให้นักวิ่งคนหนึ่งยิ่งใหญ่อย่างแท้จริง"], ["p", "ดังนั้น นักวิ่งที่ดีที่สุดอาจไม่ใช่คนที่อยู่บนโพเดียม แต่เป็นคนธรรมดาที่ตื่นขึ้นมาวิ่งทุกวัน ที่รักการวิ่ง ที่เติบโตทีละน้อย และที่ยังคงเดินทางต่อไป และนั่นคือนักวิ่งที่เราทุกคนสามารถเป็นได้"]], "34": [["p", "ในการไล่ตามการพัฒนา นักวิ่งหลายคนแสวงหาความสมบูรณ์แบบ ท่าวิ่งที่สมบูรณ์ โปรแกรมที่สมบูรณ์ การแข่งขันที่สมบูรณ์ แต่ความจริงที่ปลดปล่อยที่สุดอย่างหนึ่งที่เราเรียนรู้ได้คือ การวิ่งไม่มีวันสมบูรณ์แบบ และนั่นคือส่วนหนึ่งของความงามของมัน"], ["h", "ความสมบูรณ์แบบที่ไม่มีอยู่จริง"], ["p", "ไม่มีการวิ่งครั้งใดที่สมบูรณ์แบบอย่างแท้จริง เสมอมีบางอย่างที่ทำได้ดีกว่า เสมอมีวันที่ร่างกายไม่ตอบสนองอย่างที่หวัง เสมอมีความผิดพลาดและความไม่สมบูรณ์ หากเราตั้งความสมบูรณ์แบบเป็นมาตรฐาน เราจะผิดหวังอยู่เสมอ เพราะเราไล่ตามสิ่งที่ไม่มีอยู่จริง"], ["p", "นักวิ่งที่ยึดติดกับความสมบูรณ์แบบมักทุกข์ พวกเขามองข้ามความก้าวหน้าที่แท้จริงเพราะมัวแต่โฟกัสกับสิ่งที่ยังไม่ดีพอ พวกเขาไม่สามารถเพลิดเพลินกับการวิ่งได้เพราะมันไม่เคยดีพอในสายตาของพวกเขา"], ["h", "โอบรับความไม่สมบูรณ์"], ["p", "เมื่อเรายอมรับว่าการวิ่งไม่มีวันสมบูรณ์แบบ เราจะปลดปล่อยตัวเองจากภาระอันหนักอึ้งนี้ เราจะเรียนรู้ที่จะโอบรับความไม่สมบูรณ์ ยอมรับวันที่วิ่งไม่ดี ให้อภัยตัวเองเมื่อทำผิดพลาด และเห็นคุณค่าของการเดินทางแม้ในความไม่สมบูรณ์ของมัน"], ["p", "ความไม่สมบูรณ์ไม่ใช่ความล้มเหลว แต่เป็นธรรมชาติของการเป็นมนุษย์และการเติบโต ทุกความผิดพลาดเป็นโอกาสในการเรียนรู้ ทุกวันที่ไม่ดีเป็นส่วนหนึ่งของภาพรวมที่ใหญ่กว่า และการยอมรับสิ่งนี้ทำให้เราวิ่งด้วยใจที่เบาและมีความสุขมากขึ้น"], ["h", "ความงามในความไม่สมบูรณ์"], ["p", "ยิ่งไปกว่านั้น ความไม่สมบูรณ์เองก็มีความงาม การที่การวิ่งไม่มีวันสมบูรณ์แบบหมายความว่ามีที่ให้เติบโตเสมอ มีสิ่งใหม่ให้เรียนรู้เสมอ มีการเดินทางให้ดำเนินต่อเสมอ หากการวิ่งสมบูรณ์แบบได้ มันจะกลายเป็นสิ่งที่จบสิ้นและน่าเบื่อ แต่เพราะมันไม่มีวันสมบูรณ์ มันจึงเป็นการผจญภัยที่ไม่มีวันจบ"], ["p", "นักวิ่งที่เข้าใจสิ่งนี้จะพบความสงบและความสุขที่ลึกกว่า พวกเขาไม่ต้องต่อสู้เพื่อความสมบูรณ์แบบที่เป็นไปไม่ได้อีกต่อไป แต่สามารถเพลิดเพลินกับกระบวนการของการพยายามเป็นตัวเราที่ดีขึ้น โดยไม่ต้องไปถึงจุดสิ้นสุดที่สมบูรณ์"], ["h", "ก้าวหน้า ไม่ใช่สมบูรณ์แบบ"], ["p", "เมื่อเราเปลี่ยนเป้าหมายจากความสมบูรณ์แบบมาเป็นความก้าวหน้า ทุกอย่างเปลี่ยนไป เราไม่ต้องการให้ทุกอย่างสมบูรณ์ เพียงต้องการให้มันดีขึ้นทีละน้อย เราไม่ต้องการวันที่ไร้ที่ติ เพียงต้องการวันที่เราพยายามและเติบโต"], ["p", "และในการปล่อยวางความสมบูรณ์แบบนี้ เราพบอิสระ อิสระที่จะวิ่งด้วยความสุข อิสระที่จะทำผิดพลาดและเรียนรู้ อิสระที่จะเป็นมนุษย์ที่ไม่สมบูรณ์แต่กำลังเดินทางไปข้างหน้า และนั่นคือของขวัญที่งดงามอย่างหนึ่งของการวิ่ง"]], "35": [["p", "เมื่อเราเดินทางในเส้นทางของนักวิ่งมานาน และมองย้อนกลับไป เราจะเห็นว่าการวิ่งมอบสิ่งต่าง ๆ ให้เรามากกว่าที่เร const tocEl = document.getElementById("toc");
DATA.toc.forEach(part=>{
  const ph=document.createElement("div");ph.className="part";ph.textContent=part.part;tocEl.appendChild(ph);
  part.chapters.forEach(c=>{
    const el=document.createElement("div");
    el.className="ch"+(c[2]?"":" locked");
    el.dataset.num=c[0];
    const label = c[0]===0 ? "" : (c[0]===0.5 ? "" : c[0]);
    el.innerHTML=`<span class="cn">${label!==""?label:"•"}</span><span>${c[1]}</span>`+(c[2]?"":'<span class="lock">🔒</span>');
    if(c[2]) el.onclick=()=>{go(c[0]);closeSidebar();};
    tocEl.appendChild(el);
  });
});

// ---------- Text-to-Speech (Web Speech API) ----------
let ttsEls = [], ttsIdx = 0, ttsActive = false;
const synth = window.speechSynthesis || null;
function pickThaiVoice(){
  if(!synth) return null;
  const vs = synth.getVoices();
  return vs.find(v=>/^th/i.test(v.lang)) || vs.find(v=>/thai/i.test(v.name)) || null;
}
if(synth){ synth.onvoiceschanged = ()=>{}; }
function clearHighlight(){
  document.querySelectorAll(".body .speaking").forEach(e=>e.classList.remove("speaking"));
}
function showPlayer(show){ document.getElementById("ttsPlayer").classList.toggle("show", show); }
function stopTTS(){
  if(synth) synth.cancel();
  ttsActive=false; ttsIdx=0; clearHighlight(); showPlayer(false);
  const t=document.getElementById("ttsToggle"); if(t) t.textContent="⏸";
}
function speakNext(){
  if(!ttsActive || ttsIdx>=ttsEls.length){ stopTTS(); return; }
  const el = ttsEls[ttsIdx];
  const u = new SpeechSynthesisUtterance(el.textContent);
  u.lang = "th-TH";
  const v = pickThaiVoice(); if(v) u.voice = v;
  u.rate = 0.98; u.pitch = 1.0;
  u.onstart = ()=>{ clearHighlight(); el.classList.add("speaking");
    el.scrollIntoView({block:"center", behavior:"smooth"}); };
  u.onend = ()=>{ ttsIdx++; speakNext(); };
  u.onerror = ()=>{ ttsIdx++; speakNext(); };
  synth.speak(u);
}
function startTTS(){
  if(!synth){ alert("อุปกรณ์นี้ไม่รองรับการอ่านออกเสียงในเบราว์เซอร์ ลองใช้ Chrome หรือ Safari รุ่นใหม่"); return; }
  synth.cancel();
  ttsEls = Array.from(document.querySelectorAll(".body > p, .body > h2, .body > .q"));
  if(!ttsEls.length) return;
  ttsIdx = 0; ttsActive = true;
  showPlayer(true);
  document.getElementById("ttsToggle").textContent="⏸";
  speakNext();
}

function render(num){
  stopTTS();
  const meta = flat.find(f=>f.num===num);
  const reader = document.getElementById("reader");
  const blocks = DATA.content[key(num)];
  let inner = `<div class="eyebrow">${meta.part}</div>`;
  const t = (num===0||num===0.5)?meta.title:`บทที่ ${num} · ${meta.title}`;
  const hasContent = !!blocks;
  inner += `<h1 class="ch-title">${t}</h1><div class="rule"></div>`;
  if(hasContent){
    inner += `<button class="listen-btn" onclick="startTTS()"><span class="ic">🔊</span> ฟังเสียงอ่าน</button>`;
  }
  inner += `<div class="body">`;
  if(blocks){
    blocks.forEach(b=>{
      if(b[0]==="h") inner+=`<h2>${b[1]}</h2>`;
      else if(b[0]==="q") inner+=`<div class="q">${b[1]}</div>`;
      else inner+=`<p>${b[1]}</p>`;
    });
  } else {
    inner += `<div class="locked-note"><div class="lt">บทนี้กำลังจะมาในเล่มถัดไป</div>
      <p>เนื้อหาฉบับเต็มของบทนี้อยู่ระหว่างการเรียบเรียง ตอนนี้เล่ม 1 ครอบคลุมคำนำ บทนำ และภาคที่ 1 บทที่ 1–6 (วิทยาศาสตร์พื้นฐานของการวิ่ง) อย่างละเอียด</p></div>`;
  }
  inner += `</div>`;

  // nav
  const idx = flat.findIndex(f=>f.num===num);
  const prev = flat[idx-1], next = flat[idx+1];
  inner += `<div class="chnav">`;
  if(prev) inner+=`<a onclick="go(${prev.num})" class="${prev.ready?'':'disabled'}"><div class="dir">← ก่อนหน้า</div><div class="nm">${prev.num&&prev.num>=1?'บทที่ '+prev.num+' ':''}${prev.title}</div></a>`;
  else inner+=`<a class="disabled"></a>`;
  if(next) inner+=`<a onclick="go(${next.num})" class="nx ${next.ready?'':'disabled'}"><div class="dir">ถัดไป →</div><div class="nm">${next.num&&next.num>=1?'บทที่ '+next.num+' ':''}${next.title}</div></a>`;
  else inner+=`<a class="disabled"></a>`;
  inner += `</div>`;

  reader.className = "reader";
  reader.innerHTML = inner;
  document.getElementById("coverNav").classList.remove("active");
  document.querySelectorAll(".ch").forEach(c=>c.classList.toggle("active",+c.dataset.num===num));
  window.scrollTo(0,0);
  try{localStorage.setItem("ebook_last",String(num))}catch(e){}
}
function go(num){
  const meta = flat.find(f=>f.num===num);
  if(!meta||!meta.ready) return;
  render(num);
}

// font size
let fs = 19;
try{ fs = parseInt(localStorage.getItem("ebook_fs"))||19 }catch(e){}
function applyFs(){document.documentElement.style.setProperty("--fs",fs+"px");try{localStorage.setItem("ebook_fs",fs)}catch(e){}}
applyFs();
document.getElementById("fup").onclick=()=>{fs=Math.min(26,fs+1);applyFs()};
document.getElementById("fdown").onclick=()=>{fs=Math.max(15,fs-1);applyFs()};

// TTS player controls
document.getElementById("ttsToggle").onclick = ()=>{
  if(!synth) return;
  const btn=document.getElementById("ttsToggle");
  if(synth.paused){ synth.resume(); btn.textContent="⏸"; }
  else if(synth.speaking){ synth.pause(); btn.textContent="▶"; }
};
document.getElementById("ttsStop").onclick = stopTTS;
window.addEventListener("beforeunload", ()=>{ if(synth) synth.cancel(); });

// sidebar mobile
const sb=document.getElementById("sidebar"),ov=document.getElementById("overlay");
function closeSidebar(){sb.classList.remove("open");ov.classList.remove("show")}
document.getElementById("menuBtn").onclick=()=>{sb.classList.toggle("open");ov.classList.toggle("show")};
ov.onclick=closeSidebar;

// progress bar
window.addEventListener("scroll",()=>{
  const h=document.body.scrollHeight-window.innerHeight;
  document.getElementById("prog").style.width=(h>0?(window.scrollY/h*100):0)+"%";
});

// start
let saved=null;
try{saved=localStorage.getItem("ebook_last");}catch(e){}
if(saved===null||saved==="cover"){ showCover(); }
else if(flat.find(f=>f.num===+saved&&f.ready)){ render(+saved); }
else { showCover(); }
</script>
